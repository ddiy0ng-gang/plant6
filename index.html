<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#4A8C5A">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="식물정원">
<title>나의 식물 정원</title>
<link rel="manifest" href="./manifest.json">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
body { font-family:'Noto Sans KR',sans-serif; background:#F8FAF8; color:#1A2E1A; min-height:100vh; }

.header {
  background:#fff; padding:52px 20px 16px;
  border-bottom:1px solid #E8F0EA;
  position:sticky; top:0; z-index:10;
}
.header-title { font-size:20px; font-weight:600; }
.header-sub { font-size:13px; color:#7A9A7A; margin-top:3px; }
.urgent { color:#C85030; font-weight:500; }
.ok-text { color:#3A7A4A; font-weight:500; }

.notif-bar {
  margin:12px 16px 0; background:#FFF8EE;
  border:1px solid #F0D8A0; border-radius:14px;
  padding:12px 14px; display:none;
  align-items:center; justify-content:space-between; gap:10px;
}
.notif-bar p { font-size:12px; color:#9A7A30; flex:1; }
.notif-btn {
  background:#D4A020; color:#fff; border:none; border-radius:10px;
  padding:6px 12px; font-size:12px; font-weight:500;
  font-family:inherit; cursor:pointer;
}

.list { padding:12px 16px 80px; }

.card {
  background:#fff; border-radius:18px; margin-bottom:10px;
  border:1px solid #E8F0EA; overflow:hidden;
  box-shadow:0 1px 6px rgba(74,140,90,0.06);
  animation:fadeUp 0.4s ease both;
}
.card.late { border-color:#F5D5CC; box-shadow:0 2px 10px rgba(224,112,80,0.08); }
.card.soon { border-color:#F0E0B0; }

@keyframes fadeUp {
  from { opacity:0; transform:translateY(12px); }
  to   { opacity:1; transform:translateY(0); }
}

.card-bar { height:3px; }
.card-body { padding:16px 16px 14px; }

.card-top { display:flex; align-items:center; gap:12px; margin-bottom:10px; }
.card-icon {
  width:46px; height:46px; border-radius:14px;
  display:flex; align-items:center; justify-content:center;
  font-size:22px; flex-shrink:0;
}
.card-info { flex:1; min-width:0; }
.card-name { font-size:15px; font-weight:600; }
.card-en { font-size:12px; color:#9AB09A; margin-top:1px; }
.card-badge {
  font-size:12px; font-weight:600; padding:5px 12px;
  border-radius:20px; white-space:nowrap; flex-shrink:0;
}

.card-tip {
  font-size:12px; color:#6A8A6A; background:#F3F8F3;
  border-radius:10px; padding:8px 12px; margin-bottom:10px;
  border-left:3px solid #C0D8C0; line-height:1.5;
}

.chips { display:flex; gap:6px; flex-wrap:wrap; margin-bottom:10px; }
.chip {
  font-size:11px; color:#5A7A5A; background:#F0F6F0;
  border:1px solid #D8EAD8; border-radius:8px; padding:3px 9px;
}

.progress-wrap { margin-bottom:12px; }
.progress-labels {
  display:flex; justify-content:space-between;
  font-size:11px; color:#9AB09A; margin-bottom:4px;
}
.progress-track { height:5px; background:#EEF4EE; border-radius:10px; overflow:hidden; }
.progress-fill { height:100%; border-radius:10px; transition:width 0.5s ease; }

.btn-row { display:flex; gap:8px; }
.btn-main {
  flex:1; padding:11px; border-radius:13px; border:none;
  color:#fff; font-size:14px; font-weight:600;
  font-family:inherit; cursor:pointer; transition:opacity 0.15s;
}
.btn-main:active { opacity:0.82; }
.btn-cal {
  padding:11px 15px; border-radius:13px;
  border:1px solid #C8DCC8; background:#fff;
  color:#5A7A5A; font-size:16px; cursor:pointer;
}

.pick-box {
  background:#F3F8F3; border-radius:14px; padding:14px;
}
.pick-label { font-size:13px; color:#4A6A4A; font-weight:500; margin-bottom:10px; }
.pick-input {
  width:100%; padding:10px 14px; border-radius:10px;
  border:1.5px solid #C0D8C0; font-size:14px;
  background:#fff; font-family:inherit; margin-bottom:8px;
  outline:none; color:#1A2E1A;
}
.pick-input:focus { border-color:#4A8C5A; }
.pick-btns { display:flex; gap:8px; }
.pick-confirm {
  flex:1; padding:10px; border-radius:12px; border:none;
  background:#4A8C5A; color:#fff; font-size:13px; font-weight:600;
  font-family:inherit; cursor:pointer;
}
.pick-cancel {
  padding:10px 14px; border-radius:12px;
  border:1px solid #C0D8C0; background:#fff;
  color:#6A8A6A; font-size:13px; font-family:inherit; cursor:pointer;
}

.toast {
  position:fixed; bottom:28px; left:50%;
  transform:translateX(-50%) translateY(20px);
  background:#1A2E1A; color:#fff; font-size:13px; font-weight:500;
  padding:11px 22px; border-radius:30px; white-space:nowrap;
  box-shadow:0 4px 20px rgba(0,0,0,0.15); z-index:999;
  opacity:0; transition:all 0.28s ease; pointer-events:none;
}
.toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
</style>
</head>
<body>

<div class="header">
  <div class="header-title">나의 식물 정원 🌿</div>
  <div class="header-sub" id="headerSub"></div>
</div>

<div class="notif-bar" id="notifBar">
  <p>🔔 물주기 알림을 받아볼 수 있어요</p>
  <button class="notif-btn" onclick="reqNotif()">알림 켜기</button>
</div>

<div class="list" id="plantList"></div>
<div class="toast" id="toast"></div>

<script>
const PLANTS = [
  { id:"asparagus", name:"아스파라거스", en:"Asparagus Fern", days:3, emoji:"🌾",
    tip:"흙 표면이 마르면 바로 물주기. 촉촉한 상태를 유지해주세요." },
  { id:"monstera", name:"몬스테라 스프루세아나", en:"Monstera Spruceana", days:7, emoji:"🌿",
    tip:"잎이 처지면 물 부족 신호. 잎 분무도 좋아해요." },
  { id:"albuca", name:"알부카 스피랄리스", en:"Albuca Spiralis", days:10, emoji:"🌀",
    tip:"봄·가을 생장기엔 더 자주. 과습 주의!" },
  { id:"fishbone", name:"피쉬본", en:"Fishbone Cactus", days:14, emoji:"🪴",
    tip:"흙이 완전히 마른 후 물주기. 과습 금물!" },
  { id:"ungdong", name:"웅동자금", en:"Bear's Paw", days:14, emoji:"🐾",
    tip:"잎에 물 닿지 않게 주의! 아랫부분에만 주세요." },
  { id:"goemaaok", name:"괴마옥", en:"Euphorbia Obesa", days:21, emoji:"🌵",
    tip:"겨울엔 한 달에 1회. 건조하게 키우기." },
  { id:"ujumok", name:"우주목", en:"Jade Plant", days:21, emoji:"💎",
    tip:"잎이 쭈글거리면 물 부족 신호. 줄기 튼튼하게." },
];

let log = {}, picking = null;

const today = () => new Date().toISOString().split("T")[0];
const addDays = (s,n) => { const d=new Date(s); d.setDate(d.getDate()+n); return d.toISOString().split("T")[0]; };
const getDL = (s) => { const t=new Date(); t.setHours(0,0,0,0); const n=new Date(s); n.setHours(0,0,0,0); return Math.ceil((n-t)/864e5); };
const fmt = (s) => { if(!s)return""; const d=new Date(s); return `${d.getMonth()+1}월 ${d.getDate()}일`; };

function load() { try{ log=JSON.parse(localStorage.getItem("plantLog")||"{}"); }catch{log={};} }
function save() { try{ localStorage.setItem("plantLog",JSON.stringify(log)); }catch{} }

function showToast(msg) {
  const t=document.getElementById("toast");
  t.textContent=msg; t.classList.add("show");
  setTimeout(()=>t.classList.remove("show"),2200);
}

function waterNow(id) { log[id]=today(); save(); picking=null; render(); showToast("💧 물줬어요!"); }

function waterDate(id) {
  const v=document.getElementById("di_"+id)?.value;
  if(v){ log[id]=v; save(); picking=null; render(); showToast("📅 "+fmt(v)+"으로 기록됐어요"); }
}

function togglePick(id) { picking=picking===id?null:id; render(); }

function updateHeader() {
  const urgent=PLANTS.filter(p=>{ const l=log[p.id]; return !l||getDL(addDays(l,p.days))<=0; }).length;
  document.getElementById("headerSub").innerHTML = urgent>0
    ? `오늘 ${fmt(today())} · <span class="urgent">${urgent}개 물주기 필요해요</span>`
    : `오늘 ${fmt(today())} · <span class="ok-text">모든 식물 괜찮아요 ✓</span>`;
}

function render() {
  updateHeader();
  const list=document.getElementById("plantList");
  list.innerHTML="";

  PLANTS.forEach((p,i) => {
    const last=log[p.id], next=last?addDays(last,p.days):null;
    const dl=next?getDL(next):null;
    const isLate=dl!==null&&dl<=0, isSoon=dl!==null&&dl>0&&dl<=2, isNone=!last;
    const prog=last?Math.max(0,Math.min(100,((p.days-(dl??0))/p.days)*100)):0;

    const accent=isLate?"#E07050":isSoon?"#D4A020":!isNone?"#4A8C5A":"#C0D8C0";
    const bbg=isLate?"#FEF0EC":isSoon?"#FEF7E6":!isNone?"#EBF5EC":"#F0F4F0";
    const bc=isLate?"#C85030":isSoon?"#B88010":!isNone?"#3A7A4A":"#7A927A";
    const bt=isNone?"기록 없음":isLate?`${Math.abs(dl)}일 지남`:dl===0?"오늘!":dl+"일 후";
    const btnBg=isLate?"#E07050":isSoon?"#D4A020":"#4A8C5A";
    const btnLbl=isNone?"처음 물주기 💧":isLate?"지금 물주기 💧":"물줬어요 💧";
    const isPick=picking===p.id;

    let chips=`<span class="chip">주기 ${p.days}일</span>`;
    if(last) chips+=`<span class="chip">마지막 ${fmt(last)}</span>`;
    if(next) chips+=`<span class="chip">다음 ${fmt(next)}</span>`;

    let prog_html="";
    if(last) prog_html=`
      <div class="progress-wrap">
        <div class="progress-labels"><span>물주기 주기</span><span>${Math.round(prog)}%</span></div>
        <div class="progress-track"><div class="progress-fill" style="width:${prog}%;background:${accent}"></div></div>
      </div>`;

    let action=isPick?`
      <div class="pick-box">
        <div class="pick-label">📅 물 준 날짜를 선택해주세요</div>
        <input id="di_${p.id}" class="pick-input" type="date" max="${today()}" value="${last||today()}">
        <div class="pick-btns">
          <button class="pick-confirm" onclick="waterDate('${p.id}')">이 날짜로 저장</button>
          <button class="pick-cancel" onclick="togglePick('${p.id}')">취소</button>
        </div>
      </div>`:`
      <div class="btn-row">
        <button class="btn-main" style="background:${btnBg}" onclick="waterNow('${p.id}')">${btnLbl}</button>
        <button class="btn-cal" onclick="togglePick('${p.id}')" title="날짜 직접 선택">📅</button>
      </div>`;

    const card=document.createElement("div");
    card.className="card"+(isLate?" late":isSoon?" soon":"");
    card.style.animationDelay=`${i*0.05}s`;
    card.innerHTML=`
      <div class="card-bar" style="background:${accent}"></div>
      <div class="card-body">
        <div class="card-top">
          <div class="card-icon" style="background:${bbg}">${p.emoji}</div>
          <div class="card-info">
            <div class="card-name">${p.name}</div>
            <div class="card-en">${p.en}</div>
          </div>
          <div class="card-badge" style="background:${bbg};color:${bc}">${bt}</div>
        </div>
        <div class="card-tip">${p.tip}</div>
        <div class="chips">${chips}</div>
        ${prog_html}
        ${action}
      </div>`;
    list.appendChild(card);
  });
}

async function reqNotif() {
  const r=await Notification.requestPermission();
  document.getElementById("notifBar").style.display="none";
  if(r==="granted") showToast("🔔 알림 설정 완료!");
}

if("serviceWorker"in navigator) navigator.serviceWorker.register("./sw.js").catch(()=>{});
if("Notification"in window&&Notification.permission==="default") {
  document.getElementById("notifBar").style.display="flex";
}

load(); render();
</script>
</body>
</html>
